version: '3.9'

# VisionPipeline - Production-Grade Computer Vision MLOps Platform
#
# Services:
# - postgres: TimescaleDB for time-series metrics
# - redis: Caching and Celery broker
# - mlflow: Experiment tracking UI
# - prometheus: Metrics collection
# - grafana: Monitoring dashboards
# - cv-service: CV processing WebSocket service

services:
  # TimescaleDB (PostgreSQL extension for time-series)
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: visionpipeline-postgres
    environment:
      POSTGRES_DB: visionpipeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - visionpipeline-network

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: visionpipeline-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - visionpipeline-network

  # MLflow for experiment tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: visionpipeline-mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow.db
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    networks:
      - visionpipeline-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: visionpipeline-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - visionpipeline-network

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: visionpipeline-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana_datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - visionpipeline-network

  # CV Processing Service (WebSocket)
  cv-service:
    build:
      context: ./mini-services/cv-service
      dockerfile: Dockerfile
    container_name: visionpipeline-cv-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/visionpipeline
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - visionpipeline-network

  # Airflow for scheduling
  airflow:
    image: apache/airflow:2.8.0
    container_name: visionpipeline-airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./mini-services/cv-service/dags:/opt/airflow/dags:ro
    depends_on:
      - postgres
    command: standalone
    networks:
      - visionpipeline-network

networks:
  visionpipeline-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
